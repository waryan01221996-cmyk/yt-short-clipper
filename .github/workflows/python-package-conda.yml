name: AI Video Clipper

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'Masukkan URL Video YouTube'
        required: true
      max_shorts:
        description: 'Jumlah Maksimal Klip'
        required: true
        default: '3'

jobs:
  clip-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run AI Clipper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AI_PROVIDER: "gemini"
        run: |
          python main.py --url "${{ github.event.inputs.youtube_url }}" --max-shorts ${{ github.event.inputs.max_shorts }}

      - name: Upload Output Clips
        uses: actions/upload-artifact@v4
        with:
          name: ai-shorts-output
          path: ./output/
